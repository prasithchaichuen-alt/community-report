<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปงบประมาณชุมชน</title>
    <style>
        body { background-color: #f0f2f5; margin: 0; font-family: 'Sarabun', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .community-card { width: 100%; max-width: 450px; background: #ffffff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; border-top: 10px solid #28a745; box-sizing: border-box; margin-bottom: 20px; }
        .card-title { color: #333; margin-bottom: 20px; text-align: center; font-size: 1.4rem; font-weight: bold; }
        .stat-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .stat-label { color: #666; font-size: 1rem; }
        .stat-value { font-weight: bold; font-size: 1.1rem; color: #2c3e50; }
        .ex-list { background: #fffcf5; padding: 12px; border-radius: 12px; margin: 15px 0; border: 1px solid #ffeeba; }
        .ex-item { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 6px 0; color: #664d03; border-bottom: 1px dashed #ffeeba; }
        .ex-item:last-child { border-bottom: none; }
        .balance-box { background: #e8f5e9; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .balance-amount { display: block; font-size: 2rem; font-weight: bold; color: #28a745; }
        .search-section { border-top: 5px solid #007bff; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
        .search-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .result-box { margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 10px; border-left: 5px solid #28a745; display: none; }
        .update-tag { display: block; text-align: center; color: #999; font-size: 0.8rem; margin-top: 15px; }
    </style>
</head>
<body>

<div class="community-card">
    <div class="card-title">📊 สรุปงบประมาณชุมชน</div>
    <div class="stat-item"><span class="stat-label">🏠 บ้านที่ชำระแล้ว</span><span class="stat-value"><span id="paid_count">0</span> ราย</span></div>
    <div class="stat-item"><span class="stat-label">💰 รายรับรวม</span><span class="stat-value" style="color: #28a745;">฿<span id="total_income">0</span></span></div>
    <div class="stat-item"><span class="stat-label">📉 รายจ่ายรวม</span><span class="stat-value" style="color: #dc3545;">- ฿<span id="total_expense">0</span></span></div>
    
    <div class="ex-list">
        <div style="font-size: 0.85rem; font-weight: bold; color: #856404; margin-bottom: 8px;">📋 รายจ่ายแยกตามหมวดหมู่:</div>
        <div class="ex-item"><span>1. ค่าใช้จ่ายส่วนกลาง</span><span id="exp_1">฿0.00</span></div>
        <div class="ex-item"><span>2. ค่าจ้างและบริการ</span><span id="exp_2">฿0.00</span></div>
        <div class="ex-item"><span>3. ค่ากิจกรรม</span><span id="exp_3">฿0.00</span></div>
        <div class="ex-item"><span>4. ค่าดำเนินการ</span><span id="exp_4">฿0.00</span></div>
    </div>

    <div class="balance-box">
        <span class="stat-label">เงินคงเหลือสุทธิ</span>
        <span class="balance-amount">฿<span id="balance">0</span></span>
    </div>
    <span class="update-tag">อัปเดตล่าสุด: <span id="update_at">-</span></span>
</div>

<div class="community-card search-section">
    <div class="card-title" style="font-size: 1.2rem;">🔍 ตรวจสอบรายบ้าน</div>
    <input type="text" id="house_input" class="search-input" placeholder="ใส่เลขที่บ้าน เช่น 410/1">
    <button onclick="checkPayment()" class="search-btn">ค้นหา</button>
    <div id="result_area" class="result-box">
        <p><strong>ชื่อ:</strong> <span id="res_name">-</span></p>
        <p><strong>สถานะ:</strong> <span id="res_status" style="font-weight: bold;">-</span></p>
        <p><strong>ยอดชำระแล้ว:</strong> <span id="res_paid" style="color: #28a745; font-weight: bold;">0</span> บาท</p>
    </div>
</div>

<script>
    const url = 'https://gist.githubusercontent.com/prasithchaichuen-alt/3c6ddfd75ff359beff201d22c8a34cd9/raw/data.json';
    let membersData = [];

    async function fetchCommunityData() {
        try {
            const response = await fetch(url + '?t=' + new Date().getTime());
            const data = await response.json();
            
            document.getElementById('paid_count').innerText = (data.paid_count || 0).toLocaleString();
            document.getElementById('total_income').innerText = (data.total_income || 0).toLocaleString();
            document.getElementById('total_expense').innerText = (data.total_expense || 0).toLocaleString();
            document.getElementById('balance').innerText = (data.balance || 0).toLocaleString();
            document.getElementById('update_at').innerText = data.update_at || '-';
            
            const ex = data.expense_by_id || {};
            const categories = [
                { id: '1', name: 'ค่าใช้จ่ายส่วนกลาง' },
                { id: '2', name: 'ค่าจ้างและบริการ' },
                { id: '3', name: 'ค่ากิจกรรม' },
                { id: '4', name: 'ค่าดำเนินการ' }
            ];

            categories.forEach(cat => {
                const element = document.getElementById(`exp_${cat.id}`);
                if (element) {
                    const val = ex[cat.id] || 0;
                    element.innerText = '฿' + val.toLocaleString(undefined, {minimumFractionDigits: 2});
                }
            });

            membersData = data.members || [];
        } catch (e) { console.error('Error:', e); }
    }

    function checkPayment() {
        const input = document.getElementById('house_input').value.trim();
        const res = document.getElementById('result_area');
        const found = membersData.find(m => m.house === input);
        if (found) {
            document.getElementById('res_name').innerText = found.name;
            document.getElementById('res_paid').innerText = found.paid.toLocaleString();
            const st = document.getElementById('res_status');
            st.innerText = found.status;
            st.style.color = (found.status === 'ยกเว้น') ? '#6c757d' : '#28a745';
            res.style.display = 'block';
        } else { alert("ไม่พบข้อมูล"); res.style.display = 'none'; }
    }
    fetchCommunityData();
</script>
</body>
</html>
