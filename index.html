<style>
    .community-card {
        font-family: 'Sarabun', sans-serif;
        max-width: 400px;
        background: #ffffff;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        padding: 25px;
        border-top: 8px solid #28a745; /* สีเขียวแสดงถึงความมั่งคั่ง */
    }
    .card-title {
        color: #333;
        margin-bottom: 20px;
        text-align: center;
        font-size: 1.2rem;
    }
    .stat-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        padding-bottom: 8px;
        border-bottom: 1px dashed #eee;
    }
    .stat-label { color: #666; }
    .stat-value { font-weight: bold; color: #222; }
    .balance-box {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        margin-top: 20px;
    }
    .balance-label { display: block; font-size: 0.9rem; color: #666; }
    .balance-amount { font-size: 1.8rem; color: #28a745; font-weight: 800; }
    .update-tag {
        display: block;
        text-align: center;
        font-size: 0.75rem;
        color: #999;
        margin-top: 15px;
    }
</style>

<div class="community-card">
    <div class="card-title">📊 สรุปงบประมาณชุมชน</div>
    
    <div class="stat-row">
        <span class="stat-label">จำนวนรายที่จ่ายแล้ว</span>
        <span class="stat-value"><span id="paid_count">0</span> ราย</span>
    </div>
    
    <div class="stat-row">
        <span class="stat-label">รายรับรวม</span>
        <span class="stat-value" style="color: #28a745;">+ <span id="total_income">0</span></span>
    </div>
    
    <div class="stat-row">
        <span class="stat-label">รายจ่ายรวม</span>
        <span class="stat-value" style="color: #dc3545;">- <span id="total_expense">0</span></span>
    </div>

    <div class="balance-box">
        <span class="balance-label">เงินคงเหลือสุทธิ</span>
        <span class="balance-amount">฿<span id="balance">0</span></span>
    </div>

    <span class="update-tag">อัปเดตล่าสุด: <span id="update_at">-</span></span>
</div>
<script>
    const url = 'https://gist.githubusercontent.com/prasithchaichuen-alt/3c6ddfd75ff359beff201d22c8a34cd9/raw/data.json';

    async function fetchCommunityData() {
        try {
            const response = await fetch(url);
            const data = await response.json();

            // ใส่ตัวเลขและจัดรูปแบบคอมม่า
            document.getElementById('paid_count').innerText = data.paid_count.toLocaleString();
            document.getElementById('total_income').innerText = data.total_income.toLocaleString();
            document.getElementById('total_expense').innerText = data.total_expense.toLocaleString();
            document.getElementById('balance').innerText = data.balance.toLocaleString();
            document.getElementById('update_at').innerText = data.update_at;

        } catch (e) {
            console.error('Error fetching data:', e);
        }
    }

    fetchCommunityData();
</script>
